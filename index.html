<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شهادة حضور - مؤسسة الإمام جابر بن زيد الوقفية</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <style>
    :root {
      --color-gold: #D4AF37;
      --color-deep-blue: #1A3A52;
      --color-cream: #F5F1E8;
      --color-charcoal: #2D2D2D;
      --color-warm-gray: #C9C5BD;
      --color-error: #E74C3C;
      --color-success: #2ECC71;
      --font-family-base: "Dubai", "Droid Arabic Kufi", "Simplified Arabic", "Segoe UI", "Tahoma", sans-serif;
    }

    body {
      font-family: var(--font-family-base);
      background-color: var(--color-cream);
      color: var(--color-charcoal);
      margin: 0;
      padding: 0; 
    }
    
    .top-navbar {
      background-color: #ffffff;
      height: 80px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      display: flex;
      align-items: center;
      padding: 0 48px;
    }

    .top-navbar img {
      height: 50px; 
      max-width: 100%;
    }

    .main-content {
      text-align: center;
      padding: 40px 20px; 
    }
    
    .header-container {
      margin-bottom: 32px;
    }

    h2 {
      color: var(--color-deep-blue);
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      margin-top: 0;
    }

    p.subtitle {
      font-size: 1.125rem;
      color: var(--color-charcoal);
      margin-bottom: 24px;
    }

    .gender-selection {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .gender-selection input[type="radio"] {
      display: none;
    }

    .gender-selection span {
      display: inline-block;
      padding: 10px 32px;
      border: 2px solid var(--color-warm-gray);
      border-radius: 4px;
      cursor: pointer;
      transition: all 200ms ease;
      font-weight: 600;
      color: var(--color-charcoal);
      font-size: 16px;
      background-color: #ffffff;
    }

    .gender-selection input[type="radio"]:checked + span {
      border-color: var(--color-gold);
      background-color: var(--color-gold);
      color: var(--color-deep-blue);
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2);
    }

    .form-group {
      margin-bottom: 24px;
    }

    input[type="text"] {
      background-color: var(--color-cream);
      border: 1px solid var(--color-warm-gray);
      border-radius: 4px;
      padding: 12px 16px;
      font-size: 16px;
      width: 80%;
      max-width: 400px;
      box-sizing: border-box;
      font-family: var(--font-family-base);
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }

    input[type="text"]:focus {
      border-color: var(--color-gold);
      outline: none;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }

    button {
      background-color: var(--color-gold);
      color: var(--color-deep-blue);
      font-weight: 600;
      padding: 12px 32px;
      font-size: 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: background-color 200ms ease, box-shadow 200ms ease;
      font-family: var(--font-family-base);
    }

    button:hover:not(:disabled) {
      background-color: #BFA02C;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
    }

    button:disabled {
      background-color: #E8E6E0;
      color: #999999;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--color-gold);
      border: 2px solid var(--color-gold);
    }
    
    .btn-secondary:hover:not(:disabled) {
      background-color: var(--color-gold);
      color: var(--color-deep-blue);
    }

    #cardWrapper {
      width: 100%;
      max-width: 841.89px; 
      margin: 20px auto;
      overflow: hidden;
      display: flex;
      justify-content: center; 
    }

    #card {
      width: 841.89px;
      height: 595.276px; 
      flex-shrink: 0; 
      position: relative;
      background-image: url('Certificate-Men.png'); 
      background-size: cover;
      background-position: center;
      transform-origin: top center; 
      background-color: transparent;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: background-image 300ms ease-in-out;
    }
    
    #nameOverlay {
      position: absolute;
      top: 250px; 
      width: 100%;
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      color: var(--color-warm-gray);
    }

    @media (max-width: 800px) {
      #card {
        transform: scale(0.40); 
        margin-bottom: -350px; 
      }
      h2 {
        font-size: 2rem;
      }
    }

    @media (max-width: 640px) {
      .top-navbar {
        height: 64px;
        padding: 0 16px;
      }
      .top-navbar img {
        height: 40px;
      }
    }
  </style>
</head>
<body>

  <div class="top-navbar">
    <img src="logo.svg" alt="مؤسسة الإمام جابر بن زيد الوقفية">
  </div>

  <div class="main-content">
    <div class="header-container">
      <h2>ندوة القرآن وبناء الإنسان</h2>
      <p class="subtitle">مؤسسة الإمام جابر بن زيد الوقفية</p>
    </div>

    <div class="gender-selection">
      <label>
        <input type="radio" name="certificateType" value="Certificate-Men.png" checked onchange="changeCertificate(this.value)">
        <span>شهادة للرجال</span>
      </label>
      <label>
        <input type="radio" name="certificateType" value="Certificate-Women.png" onchange="changeCertificate(this.value)">
        <span>شهادة للنساء</span>
      </label>
    </div>

    <div class="form-group">
      <input type="text" id="nameInput" placeholder="أدخل اسمك الكامل هنا...">
    </div>
    
    <button onclick="generateCard()">إصدار الشهادة (PDF)</button>

    <div id="cardWrapper">
      <div id="card">
        <div id="nameOverlay">الاسم هنا</div>
      </div>
    </div>
  </div>

  <script>
    function changeCertificate(imageFile) {
      document.getElementById("card").style.backgroundImage = `url('${imageFile}')`;
    }

    function generateCard() {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) {
        alert("الرجاء إدخال الاسم أولاً.");
        return;
      }

      document.getElementById("nameOverlay").innerText = name;
      
      const btn = document.querySelector("button");
      btn.innerText = "جاري الإصدار...";
      btn.disabled = true;

      const card = document.getElementById("card");
      const imageFile = document.querySelector('input[name="certificateType"]:checked').value;

      // 1. Create a native image object to pull the raw, untouched file
      const bgImg = new Image();
      bgImg.crossOrigin = "Anonymous"; // Prevents security blocks
      bgImg.src = imageFile;
      
      // When the raw image loads, we build the PDF
      bgImg.onload = () => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('l', 'mm', 'a4');
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = pdf.internal.pageSize.getHeight();

        // 2. Add the RAW, uncompressed background image directly into the PDF document
        pdf.addImage(bgImg, 'PNG', 0, 0, pdfWidth, pdfHeight);

        // 3. Take a picture of ONLY the text layer (making the background perfectly transparent)
        html2canvas(card, {
          scale: 4, // 4x High Def text rendering
          useCORS: true, 
          backgroundColor: null, // Forces a transparent canvas
          onclone: (clonedDocument) => {
            const clonedCard = clonedDocument.getElementById("card");
            clonedCard.style.transform = "none";
            clonedCard.style.margin = "0";
            clonedCard.style.width = "841.89px";
            clonedCard.style.height = "595.276px";
            // Strip the background from the clone so it captures only the floating text
            clonedCard.style.backgroundImage = "none";
            clonedCard.style.backgroundColor = "transparent";
          }
        }).then(canvas => {
          const textImgData = canvas.toDataURL("image/png");
          
          // 4. Slap the transparent text layer perfectly over the high-res background
          pdf.addImage(textImgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
          
          // 5. Download the final PDF
          pdf.save("شهادة-حضور-" + name.replace(/\s+/g, '-') + ".pdf");
          
          // Update UI
          const mainContent = document.querySelector(".main-content");
          mainContent.innerHTML = `
            <div class="header-container" style="margin-top: 40px;">
              <h2 style="color: var(--color-success);">🎉 تم تحميل شهادتك بنجاح!</h2>
              <p style="font-size: 18px; color: var(--color-charcoal); margin-top: 16px;">
                لقد تم حفظ الشهادة كملف <strong>PDF</strong> عالي الدقة.
              </p>
            </div>
          `;

          const reloadBtn = document.createElement("button");
          reloadBtn.className = "btn-secondary";
          reloadBtn.innerText = "إصدار شهادة أخرى";
          reloadBtn.style.display = "block";
          reloadBtn.style.margin = "40px auto";
          reloadBtn.onclick = () => window.location.reload();
          mainContent.appendChild(reloadBtn);

        }).catch(err => {
          alert("عذراً! حدث خطأ أثناء إضافة النص.");
          console.error(err);
          btn.innerText = "إصدار الشهادة (PDF)";
          btn.disabled = false;
        });
      };

      bgImg.onerror = () => {
        alert("عذراً! لم نتمكن من تحميل صورة الخلفية عالية الدقة. تأكد من وجود الملف.");
        btn.innerText = "إصدار الشهادة (PDF)";
        btn.disabled = false;
      };
    }
  </script>

</body>
</html>
