<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شهادة حضور - مؤسسة الإمام جابر بن زيد الوقفية</title>
  
  <!-- NEW: Replaced html2canvas with html2pdf library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <style>
    /* Design System CSS Variables */
    :root {
      --color-gold: #D4AF37;
      --color-deep-blue: #1A3A52;
      --color-cream: #F5F1E8;
      --color-charcoal: #2D2D2D;
      --color-warm-gray: #C9C5BD;
      --color-error: #E74C3C;
      --color-success: #2ECC71;
      --font-family-base: "Dubai", "Droid Arabic Kufi", "Simplified Arabic", "Segoe UI", "Tahoma", sans-serif;
    }

    body {
      font-family: var(--font-family-base);
      background-color: var(--color-cream);
      color: var(--color-charcoal);
      margin: 0;
      padding: 0; 
    }
    
    /* Navbar Styling */
    .top-navbar {
      background-color: #ffffff;
      height: 80px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      display: flex;
      align-items: center;
      padding: 0 48px;
    }

    .top-navbar img {
      height: 50px; 
      max-width: 100%;
    }

    /* Main content wrapper */
    .main-content {
      text-align: center;
      padding: 40px 20px; 
    }
    
    .header-container {
      margin-bottom: 32px;
    }

    h2 {
      color: var(--color-deep-blue);
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      margin-top: 0;
    }

    p.subtitle {
      font-size: 1.125rem;
      color: var(--color-charcoal);
      margin-bottom: 24px;
    }

    /* Gender Selection Toggle */
    .gender-selection {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .gender-selection input[type="radio"] {
      display: none;
    }

    .gender-selection span {
      display: inline-block;
      padding: 10px 32px;
      border: 2px solid var(--color-warm-gray);
      border-radius: 4px;
      cursor: pointer;
      transition: all 200ms ease;
      font-weight: 600;
      color: var(--color-charcoal);
      font-size: 16px;
      background-color: #ffffff;
    }

    .gender-selection input[type="radio"]:checked + span {
      border-color: var(--color-gold);
      background-color: var(--color-gold);
      color: var(--color-deep-blue);
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2);
    }

    /* Form Input Styling */
    .form-group {
      margin-bottom: 24px;
    }

    input[type="text"] {
      background-color: var(--color-cream);
      border: 1px solid var(--color-warm-gray);
      border-radius: 4px;
      padding: 12px 16px;
      font-size: 16px;
      width: 80%;
      max-width: 400px;
      box-sizing: border-box;
      font-family: var(--font-family-base);
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }

    input[type="text"]:focus {
      border-color: var(--color-gold);
      outline: none;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }

    /* Button Styling */
    button {
      background-color: var(--color-gold);
      color: var(--color-deep-blue);
      font-weight: 600;
      padding: 12px 32px;
      font-size: 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: background-color 200ms ease, box-shadow 200ms ease;
      font-family: var(--font-family-base);
    }

    button:hover:not(:disabled) {
      background-color: #BFA02C;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
    }

    button:disabled {
      background-color: #E8E6E0;
      color: #999999;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--color-gold);
      border: 2px solid var(--color-gold);
    }
    
    .btn-secondary:hover:not(:disabled) {
      background-color: var(--color-gold);
      color: var(--color-deep-blue);
    }

    /* Certificate Card Styling */
    #cardWrapper {
      width: 100%;
      max-width: 841.89px; /* Standard A4 Landscape Width */
      margin: 20px auto;
      overflow: hidden;
      display: flex;
      justify-content: center; 
    }

    #card {
      width: 841.89px;
      height: 595.276px; /* Standard A4 Landscape Height */
      flex-shrink: 0; 
      position: relative;
      background-image: url('Certificate-Men.png'); 
      background-size: cover;
      background-position: center;
      transform-origin: top center; 
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: background-image 300ms ease-in-out;
    }
    
    #nameOverlay {
      position: absolute;
      top: 250px; 
      width: 100%;
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      color: var(--color-warm-gray);
      direction: rtl; /* Enforce RTL rendering for PDF engine */
    }

    @media (max-width: 800px) {
      #card {
        transform: scale(0.40); 
        margin-bottom: -350px; 
      }
      h2 {
        font-size: 2rem;
      }
    }

    @media (max-width: 640px) {
      .top-navbar {
        height: 64px;
        padding: 0 16px;
      }
      .top-navbar img {
        height: 40px;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR SECTION -->
  <div class="top-navbar">
    <img src="logo.svg" alt="مؤسسة الإمام جابر بن زيد الوقفية">
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="header-container">
      <h2>ندوة القرآن وبناء الإنسان</h2>
      <p class="subtitle">مؤسسة الإمام جابر بن زيد الوقفية</p>
    </div>

    <!-- GENDER SELECTION -->
    <div class="gender-selection">
      <label>
        <input type="radio" name="certificateType" value="Certificate-Men.png" checked onchange="changeCertificate(this.value)">
        <span>شهادة للرجال</span>
      </label>
      <label>
        <input type="radio" name="certificateType" value="Certificate-Women.png" onchange="changeCertificate(this.value)">
        <span>شهادة للنساء</span>
      </label>
    </div>

    <div class="form-group">
      <input type="text" id="nameInput" placeholder="أدخل اسمك الكامل هنا...">
    </div>
    
    <!-- Changed button text to indicate PDF -->
    <button onclick="generateCard()">إصدار الشهادة (PDF)</button>

    <div id="cardWrapper">
      <div id="card">
        <div id="nameOverlay">الاسم هنا</div>
      </div>
    </div>
  </div>

  <script>
    function changeCertificate(imageFile) {
      document.getElementById("card").style.backgroundImage = `url('${imageFile}')`;
    }

    function generateCard() {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) {
        alert("الرجاء إدخال الاسم أولاً.");
        return;
      }

      document.getElementById("nameOverlay").innerText = name;
      
      const btn = document.querySelector("button");
      btn.innerText = "جاري الإصدار...";
      btn.disabled = true;

      const card = document.getElementById("card");
      
      // Temporarily remove CSS scaling so the PDF engine sees the full A4 size
      const originalTransform = card.style.transform;
      card.style.transform = "none";

      // PDF Configuration Options
      const pdfOptions = {
        margin:       0,
        filename:     'شهادة-حضور-' + name.replace(/\s+/g, '-') + '.pdf',
        image:        { type: 'jpeg', quality: 1.0 }, // Maximum quality JPEG for background
        html2canvas:  { 
          scale: 4, // 4x High Def rendering
          useCORS: true, 
          allowTaint: true,
          letterRendering: true // Helps with Arabic text sharpness
        },
        jsPDF:        { 
          unit: 'px', 
          format: [841.89, 595.276], // Exact A4 Landscape pixel dimensions
          orientation: 'landscape' 
        }
      };

      // Generate the PDF directly and save it to the user's device
      html2pdf().set(pdfOptions).from(card).save().then(() => {
        // Restore the screen shrinking for mobile viewing after download triggers
        card.style.transform = originalTransform;
        
        // Target main-content to replace UI
        const mainContent = document.querySelector(".main-content");
        mainContent.innerHTML = `
          <div class="header-container" style="margin-top: 40px;">
            <h2 style="color: var(--color-success);">🎉 تم تحميل شهادتك بنجاح!</h2>
            <p style="font-size: 18px; color: var(--color-charcoal); margin-top: 16px;">
              لقد تم حفظ الشهادة كملف <strong>PDF</strong> عالي الدقة على جهازك.
            </p>
          </div>
        `;

        // Add a button to start over
        const reloadBtn = document.createElement("button");
        reloadBtn.className = "btn-secondary";
        reloadBtn.innerText = "إصدار شهادة أخرى";
        reloadBtn.style.display = "block";
        reloadBtn.style.margin = "40px auto";
        reloadBtn.onclick = () => window.location.reload();
        mainContent.appendChild(reloadBtn);

      }).catch(err => {
        alert("عذراً! حدث خطأ أثناء إصدار الشهادة.");
        console.error(err);
        btn.innerText = "إصدار الشهادة (PDF)";
        btn.disabled = false;
        card.style.transform = originalTransform; 
      });
    }
  </script>

</body>
</html>
